name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context.payload;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            const labels = [];

            // Add needs-triage label initially
            labels.push('needs-triage');

            // Determine category label based on title
            if (title.includes('bug')) {
              labels.push('bug');
            } else if (title.includes('epic')) {
              labels.push('epic');
            } else if (title.includes('maintenance')) {
              labels.push('maintenance');
            }

            // Determine priority label based on title or body
            const priorityKeywords = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['medium', 'normal'], label: 'priority-medium' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' }
            ];

            let priorityLabel = 'priority-medium'; // Default
            for (const { keywords, label } of priorityKeywords) {
              if (keywords.some(keyword => title.includes(keyword) || body.includes(keyword))) {
                priorityLabel = label;
                break;
              }
            }
            labels.push(priorityLabel);

            // Add labels to issue
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: labels
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create sub-issues for epic
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context.payload;
            const parentNumber = issue.number;
            const parentTitle = issue.title;
            const tasks = [
              'Requirements Analysis',
              'Design and Architecture',
              'Implementation',
              'Testing and Documentation'
            ];

            const subIssues = [];

            // Create sub-issues
            for (let i = 0; i < tasks.length; i++) {
              const taskName = tasks[i];
              const subTitle = `[SUBTASK] ${parentTitle} - Task ${i + 1}: ${taskName}`;
              const subBody = `Related to #${parentNumber}`;

              try {
                const subIssue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: subTitle,
                  body: subBody,
                  labels: ['enhancement', 'needs-review']
                });
                subIssues.push(subIssue.data);
              } catch (error) {
                console.error(`Error creating sub-issue ${i + 1}:`, error);
              }
            }

            // Update parent issue with checklist
            if (subIssues.length > 0) {
              let checklist = '## Epic Tasks\n\n';
              subIssues.forEach((sub, index) => {
                checklist += `- [ ] #${sub.number} - ${sub.title}\n`;
              });

              const updatedBody = issue.body ? `${issue.body}\n\n${checklist}` : checklist;

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parentNumber,
                body: updatedBody
              });
            }

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Auto-response and label management
        uses: actions/github-script@v7
        with:
          script: |
            const { issue } = context.payload;
            const author = issue.user.login;
            const labels = issue.labels.map(label => label.name);
            const isFirstTimeContributor = await checkFirstTimeContributor(author);

            // Add first-time-contributor label if applicable
            if (isFirstTimeContributor) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['first-time-contributor']
              });
            }

            // Post welcome message for first-time contributors
            if (isFirstTimeContributor) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Welcome @${author}! This is your first issue in this repository. We appreciate your contribution!`
              });
            }

            // Post response based on issue type
            let responseBody = '';
            if (labels.includes('bug')) {
              responseBody = 'Thank you for reporting this bug! Please follow our [Bug Report Guidelines](.github/ISSUE_TEMPLATE/bug_report.md) to help us resolve this issue quickly.';
            } else if (labels.includes('epic')) {
              responseBody = 'Thank you for submitting this epic! Please follow our [Feature Request Process](.github/ISSUE_TEMPLATE/feature_request.md) as we work through this large feature.';
            } else if (labels.includes('maintenance')) {
              responseBody = 'Thank you for reporting this maintenance task! Please follow our [Maintenance Guidelines](.github/ISSUE_TEMPLATE/maintenance_report.md) to ensure proper tracking.';
            }

            if (responseBody) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: responseBody
              });
            }

            // Set milestone for high and critical priorities
            if (labels.includes('priority-high') || labels.includes('priority-critical')) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                milestone: 1 // Assuming milestone "v1.0.0" has ID 1; adjust if necessary
              });
            }

            // Update status from needs-triage to needs-review
            if (labels.includes('needs-triage')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'needs-triage'
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-review']
              });
            }

            // Helper function to check if author is first-time contributor in this repo
            async function checkFirstTimeContributor(author) {
              try {
                const issues = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  creator: author,
                  state: 'all',
                  per_page: 2
                });
                return issues.data.length === 1; // Only the current issue exists
              } catch (error) {
                console.error('Error checking first-time contributor:', error);
                return false;
              }
            }